<div class="min-h-screen bg-slate-50 font-sans flex flex-col">
  @if (globalLoading()) {
    <app-spinner-overlay label="Carregando dados..." />
  }

  <!-- Sticky Global Topbar -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm w-full">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-4">
      
      <!-- Logo / Info -->
      <div class="flex items-center gap-4">
        <div>
          <p class="text-[10px] font-bold uppercase tracking-wider text-cyan-700">Pelotas Front</p>
          <h1 class="text-sm font-black tracking-tight text-slate-900 leading-none">Console de Integração</h1>
          @if (me()) {
            <p class="text-[10px] text-slate-500 mt-0.5">{{ me()?.firstName }} {{ me()?.lastName }} - {{ me()?.email }}</p>
          }
        </div>
      </div>

      <!-- Navigation & Actions -->
      <div class="flex items-center gap-3">
        <nav class="flex items-center gap-1.5 mr-2">
          <a routerLink="/" routerLinkActive="bg-cyan-50 text-cyan-700 font-bold" [routerLinkActiveOptions]="{exact: true}" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 hover:bg-slate-100 transition">Início</a>
          @if (!hasToken()) {
            <a routerLink="/login" routerLinkActive="bg-cyan-50 text-cyan-700 font-bold" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 hover:bg-slate-100 transition">Login</a>
          } @else {
            <a routerLink="/app/me" routerLinkActive="bg-cyan-50 text-cyan-700 font-bold" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-600 hover:bg-slate-100 transition">Minha Conta</a>
            @if (canAccessAdminData()) {
              <a routerLink="/admin" routerLinkActive="bg-slate-800 text-white" class="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-xs font-bold hover:bg-slate-700 transition shadow-sm">Admin Painel</a>
            }
          }
        </nav>

        <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>

        <div class="flex items-center gap-2">
          @if (hasToken()) {
            <span class="rounded-full bg-emerald-50 border border-emerald-200 px-2 py-0.5 text-[10px] font-bold text-emerald-700 uppercase tracking-wider">Autenticado</span>
            <button type="button" class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-bold text-slate-600 hover:bg-rose-50 hover:text-rose-700 hover:border-rose-200 transition ml-2" (click)="onLogout()">Sair</button>
          } @else {
            <span class="rounded-full bg-amber-50 border border-amber-200 px-2 py-0.5 text-[10px] font-bold text-amber-700 uppercase tracking-wider">Sem Token</span>
          }
        </div>
      </div>
    </div>
  </header>

  <!-- App Content Area (No forced internal padding so landing pages can stretch) -->
  <main class="flex-1 w-full relative">
    <router-outlet />
  </main>
</div>
