<section class="mx-auto max-w-md rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
  <p class="text-xs font-semibold uppercase tracking-[0.2em] text-cyan-700">Recuperacao</p>
  <h1 class="mt-2 text-2xl font-black tracking-tight text-slate-900">Esqueci minha senha</h1>
  <p class="mt-2 text-sm text-slate-600">
    Informe seu email cadastrado. Enviaremos um código para voce redefinir sua senha.
  </p>

  <form class="mt-6 space-y-4" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-sm font-semibold text-slate-700" for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 outline-none ring-cyan-200 transition focus:ring"
        [class.border-red-300]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
        [class.focus:ring-red-200]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
        placeholder="seu@email.com"
      />
      @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
        <p class="mt-1 text-xs text-red-500">Email invalido obrigatorio.</p>
      }
    </div>

    <button
      type="submit"
      class="w-full rounded-xl bg-cyan-700 px-4 py-2 font-semibold text-white transition hover:bg-cyan-800 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="loading()"
    >
      @if (loading()) {
        <app-spinner label="Solicitando..." size="sm" [inline]="true" />
      } @else {
        Enviar Codigo
      }
    </button>
  </form>

  @if (!loading()) {
    <p class="relative z-10 mt-6 text-center text-sm text-slate-600">
      Lembrou a senha?
      <a routerLink="/login" class="font-semibold text-cyan-700 hover:text-cyan-800 hover:underline">Fazer login</a>
    </p>
  }
</section>
