<section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
  <div class="flex items-center justify-between gap-3">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-emerald-700">Usuarios</p>
      <h1 class="mt-1 text-2xl font-black tracking-tight text-slate-900">Lista de usuarios ativos</h1>
    </div>
    <button
      type="button"
      class="rounded-xl bg-emerald-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-800 disabled:cursor-not-allowed disabled:opacity-60"
      (click)="loadUsers()"
      [disabled]="loading()"
    >
      @if (loading()) {
        <app-spinner label="Atualizando..." size="sm" [inline]="true" />
      } @else {
        Atualizar
      }
    </button>
  </div>
  <div class="mt-5 grid gap-3">
    @if (loading()) {
      <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
        <app-spinner label="Buscando usuarios..." size="md" />
      </div>
    }

    @if (users().length === 0 && !loading()) {
      <p class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">Nenhum usuario encontrado.</p>
    }

    @for (user of users(); track user.id) {
      <article class="rounded-xl border border-slate-200 bg-slate-50 p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="font-semibold text-slate-900">{{ user.firstName }} {{ user.lastName }}</h2>
            <p class="text-sm text-slate-600">{{ user.email }}</p>
          </div>
          <span class="rounded-full bg-slate-200 px-2 py-1 text-xs font-semibold text-slate-700">{{ user.documentType }}</span>
        </div>
        <p class="mt-2 text-xs text-slate-500">Documento: {{ user.document }}</p>
      </article>
    }
  </div>
</section>
