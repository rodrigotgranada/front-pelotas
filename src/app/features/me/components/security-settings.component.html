<div class="max-w-xl mx-auto italic">
  <!-- Email Change Section -->
  <section class="bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-10 flex flex-col group transition-all hover:border-amber-400/20">
    <div class="flex items-center justify-between mb-8">
       <h3 class="text-sm font-black text-white uppercase italic tracking-widest flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Troca de email
       </h3>
       <span class="text-[9px] font-black text-white/20 uppercase tracking-widest leading-none">Security Layer V1</span>
    </div>
    
    <p class="text-xs text-slate-400 font-bold mb-8 opacity-60 leading-relaxed uppercase tracking-tighter italic">Solicite o código para o novo e-mail e confirme para concluir a transição da conta.</p>

    <form class="space-y-6" [formGroup]="emailChangeRequestForm" (ngSubmit)="requestEmailChange()">
      <div class="space-y-2">
        <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Para o novo email</label>
        <input
          type="email"
          formControlName="newEmail"
          class="w-full h-14 bg-slate-950/40 border border-white/10 rounded-2xl px-5 text-white font-bold outline-none focus:border-amber-400/50 transition-all placeholder:text-white/5"
          placeholder="novo.email@pelotas.com.br"
        />
      </div>

      @if (emailRequestError()) {
        <p class="rounded-xl border border-rose-500/20 bg-rose-500/5 px-4 py-3 text-[10px] font-black text-rose-400 uppercase tracking-widest italic animate-in fade-in zoom-in-95">{{ emailRequestError() }}</p>
      }

      <button
        type="submit"
        class="w-full py-4 rounded-2xl bg-white/5 text-amber-400 font-black text-[11px] uppercase tracking-[0.2em] border border-amber-400/10 hover:bg-white/10 transition-all italic disabled:opacity-30 disabled:cursor-not-allowed"
        [disabled]="requestingEmailChange() || emailRequestCooldown() > 0"
      >
        @if (emailRequestCooldown() > 0) {
          Reenviar em {{ emailRequestCooldown() }}s
        } @else {
          Solicitar codigo
        }
      </button>
    </form>

    @if (emailChangeRequested()) {
      <div class="mt-8 pt-8 border-t border-white/5 animate-in slide-in-from-top-4 duration-500">
        <form class="space-y-6" [formGroup]="emailChangeConfirmForm" (ngSubmit)="confirmEmailChange()">
          <div class="space-y-2">
            <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Código de Confirmação</label>
            <input
              type="text"
              maxlength="6"
              formControlName="code"
              class="w-full h-14 bg-slate-950/60 border border-amber-400/20 rounded-2xl px-5 text-center text-2xl font-black text-amber-400 tracking-[0.5em] outline-none transition-all placeholder:text-white/5"
              placeholder="000000"
            />
          </div>

          @if (emailConfirmError()) {
            <p class="rounded-xl border border-rose-500/20 bg-rose-500/5 px-4 py-3 text-[10px] font-black text-rose-400 uppercase tracking-widest italic">{{ emailConfirmError() }}</p>
          }

          <button
            type="submit"
            class="w-full py-4 rounded-2xl bg-amber-400 text-indigo-950 font-black text-[11px] uppercase tracking-[0.2em] hover:bg-white transition-all shadow-xl shadow-amber-400/10 active:scale-95 italic"
            [disabled]="confirmingEmailChange()"
          >
            Confirmar troca de email
          </button>
        </form>
      </div>
    }
  </section>
</div>
