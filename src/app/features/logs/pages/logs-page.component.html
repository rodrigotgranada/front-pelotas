<section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
  <div class="flex items-center justify-between gap-3">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-indigo-700">Logs</p>
      <h1 class="mt-1 text-2xl font-black tracking-tight text-slate-900">Atividades recentes</h1>
    </div>
    <button
      type="button"
      class="rounded-xl bg-indigo-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-800 disabled:cursor-not-allowed disabled:opacity-60"
      (click)="loadLogs()"
      [disabled]="loading()"
    >
      @if (loading()) {
        <app-spinner label="Atualizando..." size="sm" [inline]="true" />
      } @else {
        Atualizar
      }
    </button>
  </div>
  <div class="mt-5 grid gap-3">
    @if (loading()) {
      <div class="rounded-xl border border-slate-200 bg-slate-50 p-4">
        <app-spinner label="Buscando logs..." size="md" />
      </div>
    }

    @if (logs().length === 0 && !loading()) {
      <p class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">Nenhum log encontrado.</p>
    }

    @for (log of logs(); track log.id) {
      <article class="rounded-xl border border-slate-200 bg-slate-50 p-4">
        <div class="flex items-start justify-between gap-3">
          <h2 class="font-semibold text-slate-900">{{ log.action }}</h2>
          <span class="rounded-full bg-slate-200 px-2 py-1 text-xs font-semibold text-slate-700">{{ log.status }}</span>
        </div>
        <p class="mt-2 text-sm text-slate-600">Entidade: {{ log.entity }}</p>
        <p class="text-xs text-slate-500">{{ log.createdAt }}</p>
      </article>
    }
  </div>
</section>
